  <rect x="1000" y="68" width="22" height="22" rx="3" fill="#B8A890" filter="url(#shadow)"/>
  <rect x="1000" y="200" width="22" height="22" rx="3" fill="#B8A890" filter="url(#shadow)"/>
  <rect x="1000" y="332" width="22" height="22" rx="3" fill="#B8A890" filter="url(#shadow)"/>
  <rect x="1000" y="464" width="22" height="22" rx="3" fill="#B8A890" filter="url(#shadow)"/>
