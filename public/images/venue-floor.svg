  <rect x="990" y="68" width="32" height="78" rx="0" fill="none" stroke="#C4B4A0" stroke-width="1" opacity="0.5"/>
  <text x="1006" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8C6F5F" opacity="0.6" transform="rotate(-90, 1006, 115)">WC</text>

  <!-- ── DECORATIVE PLANTS (indoor) ── -->
