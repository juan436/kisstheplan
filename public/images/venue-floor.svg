<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Floor tile pattern -->
    <pattern id="tiles" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="#F5EDE0"/>
      <rect width="58" height="58" x="1" y="1" fill="#FAF3EA" rx="1"/>
    </pattern>
    <!-- Garden grass pattern -->
    <pattern id="grass" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#C8D8A8"/>
      <circle cx="5" cy="5" r="2" fill="#B8CC94" opacity="0.5"/>
      <circle cx="15" cy="13" r="1.5" fill="#B8CC94" opacity="0.5"/>
      <circle cx="10" cy="17" r="1" fill="#A8BC84" opacity="0.4"/>
    </pattern>
    <!-- Stone path -->
    <pattern id="stone" x="0" y="0" width="40" height="30" patternUnits="userSpaceOnUse">
      <rect width="40" height="30" fill="#D4C9B0"/>
      <rect x="1" y="1" width="18" height="13" rx="2" fill="#DDD3BA"/>
      <rect x="21" y="1" width="18" height="13" rx="2" fill="#D8CDB5"/>
      <rect x="1" y="16" width="18" height="13" rx="2" fill="#D8CDB5"/>
      <rect x="21" y="16" width="18" height="13" rx="2" fill="#DDD3BA"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4A3C32" flood-opacity="0.15"/>
    </filter>
    <filter id="wallshadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#4A3C32" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- ── EXTERIOR GARDENS ── -->
  <rect x="0" y="0" width="1200" height="800" fill="url(#grass)"/>

  <!-- Garden paths -->
  <rect x="540" y="680" width="120" height="120" fill="url(#stone)" opacity="0.9"/>
  <!-- Entrance path -->
  <path d="M540 800 L540 680 Q600 660 660 680 L660 800 Z" fill="#D4C9B0" opacity="0.6"/>

  <!-- Flower beds left -->
  <ellipse cx="80" cy="200" rx="55" ry="35" fill="#B8C89A" opacity="0.7"/>
  <ellipse cx="80" cy="200" rx="35" ry="20" fill="#A8B88A"/>
  <circle cx="65" cy="193" r="8" fill="#E8A0A0" opacity="0.8"/>
  <circle cx="82" cy="188" r="6" fill="#F0C0C0" opacity="0.8"/>
  <circle cx="95" cy="197" r="7" fill="#E090A0" opacity="0.8"/>
  <circle cx="72" cy="207" r="5" fill="#F0B0B0" opacity="0.8"/>
