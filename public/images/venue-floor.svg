  <circle cx="145" cy="90" r="38" fill="#8EAE6E" opacity="0.85"/>
  <circle cx="145" cy="90" r="28" fill="#9EBE7E" opacity="0.9"/>
  <circle cx="145" cy="85" r="18" fill="#AEce8E"/>
  <circle cx="1055" cy="90" r="38" fill="#8EAE6E" opacity="0.85"/>
  <circle cx="1055" cy="90" r="28" fill="#9EBE7E" opacity="0.9"/>
  <circle cx="1055" cy="85" r="18" fill="#AEce8E"/>
