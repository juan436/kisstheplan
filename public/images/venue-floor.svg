  <line x1="1031" y1="390" x2="1031" y2="440" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="1022" y="520" width="18" height="50" rx="2" fill="#D4EEF8" opacity="0.85"/>
  <line x1="1031" y1="520" x2="1031" y2="570" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="1022" y="630" width="18" height="50" rx="2" fill="#D4EEF8" opacity="0.85"/>
  <line x1="1031" y1="630" x2="1031" y2="680" stroke="#B8D4E8" stroke-width="1"/>

