  <circle cx="1055" cy="710" r="28" fill="#9EBE7E" opacity="0.9"/>
  <circle cx="1055" cy="705" r="18" fill="#AEce8E"/>

  <!-- ── MAIN BUILDING WALLS ── -->
  <!-- Outer wall shadow -->
  <rect x="168" y="58" width="868" height="684" rx="4" fill="#4A3C32" opacity="0.15" filter="url(#wallshadow)"/>
  <!-- Outer walls -->
  <rect x="160" y="50" width="880" height="700" rx="4" fill="#C4B4A0"/>
  <!-- Inner floor -->
  <rect x="178" y="68" width="844" height="664" rx="2" fill="url(#tiles)"/>

  <!-- ── COLUMNS (structural, visible from top) ── -->
  <!-- Left column row -->
  <rect x="178" y="68" width="22" height="22" rx="3" fill="#B8A890" filter="url(#shadow)"/>
  <rect x="178" y="200" width="22" height="22" rx="3" fill="#B8A890" filter="url(#shadow)"/>
  <rect x="178" y="332" width="22" height="22" rx="3" fill="#B8A890" filter="url(#shadow)"/>
  <rect x="178" y="464" width="22" height="22" rx="3" fill="#B8A890" filter="url(#shadow)"/>
