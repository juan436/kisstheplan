  <ellipse cx="80" cy="600" rx="35" ry="20" fill="#A8B88A"/>
  <circle cx="65" cy="593" r="8" fill="#E8A0A0" opacity="0.8"/>
  <circle cx="82" cy="588" r="6" fill="#F0C0C0" opacity="0.8"/>
  <circle cx="95" cy="597" r="7" fill="#E090A0" opacity="0.8"/>

  <!-- Flower beds right -->
  <ellipse cx="1120" cy="200" rx="55" ry="35" fill="#B8C89A" opacity="0.7"/>
  <ellipse cx="1120" cy="200" rx="35" ry="20" fill="#A8B88A"/>
  <circle cx="1105" cy="193" r="8" fill="#E8A0A0" opacity="0.8"/>
  <circle cx="1122" cy="188" r="6" fill="#F0C0C0" opacity="0.8"/>
  <circle cx="1135" cy="197" r="7" fill="#E090A0" opacity="0.8"/>
