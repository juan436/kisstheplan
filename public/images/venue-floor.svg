  <!-- ── WINDOWS LEFT WALL ── -->
  <rect x="160" y="130" width="18" height="50" rx="2" fill="#D4EEF8" opacity="0.85"/>
  <line x1="169" y1="130" x2="169" y2="180" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="160" y="260" width="18" height="50" rx="2" fill="#D4EEF8" opacity="0.85"/>
  <line x1="169" y1="260" x2="169" y2="310" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="160" y="390" width="18" height="50" rx="2" fill="#D4EEF8" opacity="0.85"/>
  <line x1="169" y1="390" x2="169" y2="440" stroke="#B8D4E8" stroke-width="1"/>
