  <line x1="680" y1="59" x2="740" y2="59" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="860" y="50" width="60" height="18" rx="2" fill="#D4EEF8" opacity="0.85"/>
  <line x1="860" y1="59" x2="920" y2="59" stroke="#B8D4E8" stroke-width="1"/>

  <!-- ── HEAD TABLE STAGE AREA (top) ── -->
  <rect x="340" y="68" width="520" height="90" rx="0" fill="#EDE0CD" opacity="0.85"/>
  <rect x="348" y="72" width="504" height="82" rx="2" fill="#E8D8C4" opacity="0.6"/>
  <!-- Stage steps -->
  <rect x="380" y="150" width="440" height="8" rx="1" fill="#C8B89A" opacity="0.5"/>
  <rect x="400" y="155" width="400" height="5" rx="1" fill="#C0B090" opacity="0.4"/>
  <!-- Stage label -->
  <text x="600" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#8C6F5F" letter-spacing="3" opacity="0.7">MESA DE HONOR</text>

  <!-- ── DANCE FLOOR ── -->
  <rect x="440" y="295" width="320" height="220" rx="4" fill="#E8D8C4" opacity="0.5"/>
  <rect x="448" y="303" width="304" height="204" rx="2" fill="#EDE4D6" opacity="0.4"/>
  <!-- Dance floor grid -->
  <line x1="520" y1="295" x2="520" y2="515" stroke="#D4C4B0" stroke-width="0.8" opacity="0.6"/>
  <line x1="600" y1="295" x2="600" y2="515" stroke="#D4C4B0" stroke-width="0.8" opacity="0.6"/>
  <line x1="680" y1="295" x2="680" y2="515" stroke="#D4C4B0" stroke-width="0.8" opacity="0.6"/>
  <line x1="440" y1="375" x2="760" y2="375" stroke="#D4C4B0" stroke-width="0.8" opacity="0.6"/>
  <line x1="440" y1="435" x2="760" y2="435" stroke="#D4C4B0" stroke-width="0.8" opacity="0.6"/>
  <text x="600" y="412" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#A89078" letter-spacing="3" opacity="0.6">PISTA DE BAILE</text>

  <!-- ── DJ / BAR CORNER ── -->
  <!-- Bar (top-right) -->
  <rect x="870" y="78" width="120" height="55" rx="3" fill="#D4C4A8" filter="url(#shadow)"/>
  <rect x="876" y="84" width="108" height="43" rx="2" fill="#DCCEB4" opacity="0.8"/>
  <text x="930" y="109" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8C6F5F" letter-spacing="2" opacity="0.75">BAR</text>

  <!-- DJ booth (top-left of floor) -->
  <rect x="210" y="78" width="110" height="55" rx="3" fill="#D4C4A8" filter="url(#shadow)"/>
  <rect x="216" y="84" width="98" height="43" rx="2" fill="#DCCEB4" opacity="0.8"/>
  <text x="265" y="109" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8C6F5F" letter-spacing="2" opacity="0.75">DJ</text>

  <!-- ── ENTRANCE AREA (bottom) ── -->
  <!-- Entrance hall -->
  <rect x="460" y="690" width="280" height="42" rx="0" fill="#DDD0BC" opacity="0.85"/>
  <rect x="460" y="730" width="280" height="0" fill="none" stroke="#C4B4A0" stroke-width="2"/>
  <!-- Entrance doors -->
  <rect x="520" y="690" width="50" height="42" rx="0" fill="#C8B89A" opacity="0.7"/>
  <rect x="630" y="690" width="50" height="42" rx="0" fill="#C8B89A" opacity="0.7"/>
  <!-- Door arcs -->
  <path d="M520 690 Q545 668 570 690" fill="none" stroke="#B0A080" stroke-width="1.5" opacity="0.7"/>
  <path d="M630 690 Q655 668 680 690" fill="none" stroke="#B0A080" stroke-width="1.5" opacity="0.7"/>
  <text x="600" y="715" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8C6F5F" letter-spacing="3" opacity="0.7">ENTRADA</text>

  <!-- ── SIDE ROOMS / BATHROOMS ── -->
  <!-- Left side room -->
  <rect x="178" y="68" width="32" height="80" rx="0" fill="#E8DDD0" opacity="0.7"/>
  <rect x="178" y="68" width="32" height="78" rx="0" fill="none" stroke="#C4B4A0" stroke-width="1" opacity="0.5"/>
  <text x="194" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8C6F5F" opacity="0.6" transform="rotate(-90, 194, 115)">WC</text>
